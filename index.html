const $=id=>document.getElementById(id);let config,source,stores={},inventory=[],orders=[],logs=[],operationRows=[],operationPage=1,orderLineData=[];const orderPreset={I001:120,I003:40,I005:70,I007:55,I009:60,I010:60,I011:75,I012:15,I014:20,I015:2.75};const titles={dashboard:'经营看板',operations:'门店经营数据',inventory:'库存与在途',bom:'菜品与BOM',replenish:'新建配送订单',orders:'中央厨房订单',stores:'门店档案',logs:'操作日志',demo:'演示数据管理'};const storeMeta={S001:{city:'广州',district:'天河区',lat:23.1291,lng:113.2644},S002:{city:'深圳',district:'南山区',lat:22.5333,lng:113.9304},S003:{city:'上海',district:'浦东新区',lat:31.2304,lng:121.55},S004:{city:'北京',district:'朝阳区',lat:39.9219,lng:116.4436},S005:{city:'成都',district:'高新区',lat:30.5723,lng:104.0665},S006:{city:'杭州',district:'滨江区',lat:30.2084,lng:120.212}};

async function init(){try{[config,source]=await Promise.all([fetch('data/order-config.json').then(r=>r.json()),fetch('data/inventory.json').then(r=>r.json())]);stores=config['门店下单配置'];orders=JSON.parse(localStorage.getItem('chainDemoOrders')||'[]');logs=JSON.parse(localStorage.getItem('chainDemoLogs')||'[]');buildAll();bind();switchView(location.hash.slice(1)||'dashboard')}catch(e){document.querySelector('.content').innerHTML='<div class="card empty">数据文件加载失败，请通过 HTTP 服务访问页面。</div>'}}
function storeOptions(){return Object.values(stores).map(s=>`<option value="${s['门店编号']}">${s['门店编号']}｜${s['门店名称']}</option>`).join('')}
function storeData(id){return source['门店数据'][id]['金蝶数据']}
function buildAll(){buildDashboard();buildOperations();buildInventory();buildBom();buildReplenish();buildOrders();buildStores();buildLogs();buildDemo()}
function buildDashboard(){const d=storeData('S001'),inv=d['库存现状'],risk=inv.filter(x=>x['当前库存']+x['在途库存']-x['预留库存']<x['安全库存']||x['当前库存']<x['近7天用量']/3).length;const plans=d['未来经营计划'];$('view-dashboard').innerHTML=`<div class="page-head"><div><h1>经营工作台</h1><p>多门店库存与中央厨房供应协同 · 数据日期 2026-07-23</p></div><button class="btn btn-primary" id="quickOrder">＋ 快速订货</button></div><div class="metrics">${metric('运营门店','6 家','全部门店数据校验通过','店')}${metric('库存原材料','90 项','每店 15 项原材料','料')}${metric('补货关注项',risk+' 项','广州天河店动态测算','!')}${metric('本周预测客流','2,016 人','基于近28天经营数据','人')}</div><div class="grid2"><div class="card"><div class="card-head"><div><div class="card-title">未来 7 天客流预测</div><div class="card-sub">广州天河店 · 结合预订及营销活动</div></div>${tag('预测模型已更新','ok')}</div><div class="chart" id="forecastChart"></div></div><div class="card"><div class="card-head"><div><div class="card-title">今日待办</div><div class="card-sub">供应链运营任务</div></div></div><div class="card-body"><div class="task"><span class="task-icon">补</span><div><b>广州天河店建议补货</b><p>10 项物料需要生成中央厨房订单</p></div></div><div class="task"><span class="task-icon">审</span><div><b>2 张采购订单待审核</b><p>预计金额 ¥13,684.00</p></div></div><div class="task"><span class="task-icon">盘</span><div><b>深圳南山店库存待盘点</b><p>计划完成时间：今日 17:00</p></div></div></div></div></div><div class="card"><div class="card-head"><div><div class="card-title">门店供应链概览</div><div class="card-sub">按区域查看库存与订单状态</div></div></div><div class="table-wrap"><table><thead><tr><th>门店编号</th><th>门店名称</th><th>所属区域</th><th>中央厨房</th><th>配送频次</th><th>库存品项</th><th>数据状态</th><th>操作</th></tr></thead><tbody>${Object.values(stores).map(s=>{const d=storeData(s['门店编号']);return`<tr><td>${s['门店编号']}</td><td class="strong">${s['门店名称']}</td><td>${s['模拟系统'].replace('金蝶供应链-','')}</td><td>${s['中央厨房']}</td><td>${d['门店参数']['配送频次']}</td><td>${d['库存现状'].length}</td><td>${tag('已同步','ok')}</td><td><button class="btn btn-light storeInventory" data-store="${s['门店编号']}">查看库存</button></td></tr>`}).join('')}</tbody></table></div></div>`;const values=[228,216,204,255,288,329,348];$('forecastChart').innerHTML=values.map((v,i)=>`<div class="bar-col"><span class="bar-value">${v}</span><div class="bar" style="height:${v/348*78}%"></div><span class="bar-label">${plans[i]?.['星期']||['周一','周二','周三','周四','周五','周六','周日'][i]}</span></div>`).join('')}

function submitOrder(){const id=$('order-store-select').value,s=stores[id],no=makeOrderNumber(s['中央厨房']),requestId=$('order-request-id').value.trim(),details=orderLineData.map(x=>({materialId:x['原材料编号'],materialName:x['原材料名称'],quantity:x.qty,unit:x['单位'],unitCost:x['单位成本'],amount:Number((x.qty*x['单位成本']).toFixed(2)),remark:x.remark||''})),o={no,requestId,storeId:id,store:s['门店名称'],kitchen:s['中央厨房'],address:s['收货地址'],period:$('summary-period').textContent,start:$('order-start-date').value,end:$('order-end-date').value,items:details.length,cost:Number($('order-expected-cost').textContent.replace(/[¥,]/g,'')),status:'已提交',time:'2026-07-23 14:03:36',creator:'系统管理员',note:$('order-note').value,details};orders.unshift(o);localStorage.setItem('chainDemoOrders',JSON.stringify(orders));$('confirm-modal').classList.remove('open');$('draft-order-number').textContent=no;$('order-number').textContent=no;$('order-status').textContent='已提交';$('result-request-id').textContent=requestId;$('result-time').textContent=o.time;$('order-success-message').classList.add('show');addLog('提交中央厨房订单',id+' '+s['门店名称'],'成功',requestId,no,`${details.length}项，${money(o.cost)}`);renderOrders();toast('中央厨房订单提交成功')}

function viewOrder(no){const o=allOrders().find(x=>x.no===no);if(!o)return;$('detail-order-no').textContent=o.no;$('order-detail-content').innerHTML=`<div class="grid3"><div class="summary-row"><span>request_id</span><b>${o.requestId||o.requestNo||''}</b></div><div class="summary-row"><span>门店</span><b>${o.store}</b></div><div class="summary-row"><span>中央厨房</span><b>${o.kitchen}</b></div><div class="summary-row"><span>配送周期</span><b>${o.period}</b></div><div class="summary-row"><span>配送地址</span><b>${o.address||stores[o.storeId]['收货地址']}</b></div><div class="summary-row"><span>订单状态</span><b>${o.status}</b></div></div>${o.details?.length?`<div class="table-wrap"><table><thead><tr><th>物料编号</th><th>原材料</th><th>数量</th><th>单位</th><th>单价</th><th>小计</th></tr></thead><tbody>${o.details.map(x=>`<tr><td>${x.materialId}</td><td>${x.materialName}</td><td>${x.quantity}</td><td>${x.unit}</td><td>${money(x.unitCost)}</td><td>${money(x.amount)}</td></tr>`).join('')}</tbody></table></div>`:'<div class="empty">历史演示订单未附明细行</div>'}`;$('order-detail-card').style.display='block';$('order-detail-card').scrollIntoView({behavior:'smooth'});addLog('查看订单',o.storeId,'成功',o.requestId||'',o.no,'查看详情')}
function cancelOrder(no){const o=orders.find(x=>x.no===no);if(!o)return toast('预置历史订单仅供查看，不能取消');o.status='已取消';localStorage.setItem('chainDemoOrders',JSON.stringify(orders));addLog('取消订单',o.storeId,'成功',o.requestId,no,'订单已取消');renderOrders();toast('订单已取消')}
function viewStore(id){const s=stores[id],p=storeData(id)['门店参数'],m=storeMeta[id];$('store-detail-content').innerHTML=`<div class="grid3"><div class="summary-row"><span>门店编号</span><b>${id}</b></div><div class="summary-row"><span>门店名称</span><b>${s['门店名称']}</b></div><div class="summary-row"><span>城市区县</span><b>${m.city}${m.district}</b></div><div class="summary-row"><span>经纬度</span><b>${m.lat}, ${m.lng}</b></div><div class="summary-row"><span>配送地址</span><b>${s['收货地址']}</b></div><div class="summary-row"><span>中央厨房</span><b>${s['中央厨房']}</b></div><div class="summary-row"><span>桌数</span><b>${p['桌数']}</b></div><div class="summary-row"><span>配送频次</span><b>${p['配送频次']}</b></div><div class="summary-row"><span>模拟系统</span><b>${s['模拟系统']}</b></div></div>`;$('store-detail-card').style.display='block';$('store-detail-card').scrollIntoView({behavior:'smooth'})}
function exportRows(rows,name){if(!rows.length)return toast('当前没有可导出的数据');const keys=[...new Set(rows.flatMap(Object.keys))],data=[keys,...rows.map(r=>keys.map(k=>typeof r[k]==='object'?JSON.stringify(r[k]):r[k]??''))].map(row=>row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n'),a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+data],{type:'text/csv'}));a.download=name+'.csv';a.click();URL.revokeObjectURL(a.href);addLog('导出数据',name,'成功','','',`${rows.length}条`);toast(`${name}已导出`)}
function exportOrderJson(){const o=orders[0];if(!o)return toast('请先提交订单');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(o,null,2)],{type:'application/json'}));a.download=o.no+'.json';a.click();URL.revokeObjectURL(a.href);toast('订单JSON已导出')}
function clearOrders(){orders=[];localStorage.removeItem('chainDemoOrders');renderOrders();addLog('清空测试订单','中央厨房订单','成功','','','已删除浏览器新增订单');toast('测试订单已清空')}
function resetDemo(){orders=[];logs=[];localStorage.removeItem('chainDemoOrders');localStorage.removeItem('chainDemoLogs');$('reset-modal').classList.remove('open');buildAll();bind();switchView('dashboard');toast('演示数据已恢复默认状态')}
init();
</script></body></html>
