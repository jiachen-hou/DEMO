<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="餐饮供应链智能订货演示系统"><title>云膳供应链｜经营工作台</title>
<style>
:root{--primary:#2767d7;--primary2:#174da9;--nav:#17243d;--bg:#f4f7fb;--card:#fff;--text:#172033;--muted:#78849a;--line:#e5eaf2;--green:#19a974;--orange:#f59e0b;--red:#e35151;--shadow:0 6px 20px rgba(28,47,82,.06)}*{box-sizing:border-box}body{margin:0;font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;color:var(--text);background:var(--bg);font-size:14px}button,input,select,textarea{font:inherit}.app{min-height:100vh}.top{height:54px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 22px 0 18px;position:fixed;inset:0 0 auto 0;z-index:8}.logo{display:flex;align-items:center;gap:11px;width:222px}.logo-mark{width:31px;height:31px;border-radius:8px;background:linear-gradient(135deg,#4b8cff,#1d55b8);color:#fff;display:grid;place-items:center;font-weight:900}.logo b{font-size:17px}.logo small{display:block;color:#8a96aa;font-size:10px}.top-center{color:#536176;font-size:13px}.top-right{display:flex;align-items:center;gap:16px}.top-link{color:#68758a}.avatar{width:29px;height:29px;border-radius:50%;background:#e8f0ff;color:var(--primary);display:grid;place-items:center;font-weight:700}.sidebar{position:fixed;top:54px;bottom:0;left:0;width:222px;background:linear-gradient(180deg,#1d2d49,#142138);color:#d6deed;padding:13px 10px;z-index:7}.nav-label{padding:13px 14px 6px;color:#71819d;font-size:11px}.nav-item{height:43px;border-radius:7px;display:flex;align-items:center;gap:12px;padding:0 14px;margin:3px 0;cursor:pointer;transition:.18s}.nav-item:hover,.nav-item.active{background:#2b4775;color:#fff}.nav-item.active{box-shadow:inset 3px 0 #70a6ff}.nav-icon{width:18px;text-align:center;color:#8fbaff}.main{margin-left:222px;padding-top:54px;min-height:100vh}.crumb{height:45px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 24px;color:#758096;font-size:12px}.content{padding:22px 24px 38px;max-width:1720px;margin:auto}.view{display:none}.view.active{display:block}.page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}.page-head h1{font-size:22px;margin:0 0 6px}.page-head p{margin:0;color:var(--muted);font-size:12px}.btn{height:36px;padding:0 16px;border-radius:6px;border:1px solid transparent;cursor:pointer;font-weight:600}.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary2)}.btn-light{background:#edf3ff;color:#225ab7}.btn-outline{background:#fff;border-color:#cfd8e6;color:#3f4e65}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}.metric{background:#fff;border:1px solid var(--line);border-radius:9px;padding:17px 18px;box-shadow:var(--shadow)}.metric-top{display:flex;justify-content:space-between;color:var(--muted);font-size:12px}.metric-icon{width:31px;height:31px;border-radius:8px;background:#eef4ff;color:var(--primary);display:grid;place-items:center}.metric-value{font-size:24px;font-weight:800;margin:8px 0}.metric-foot{font-size:11px;color:var(--muted)}.up{color:var(--green)}.warn{color:var(--orange)}.danger{color:var(--red)}.grid2{display:grid;grid-template-columns:1.45fr 1fr;gap:16px;margin-bottom:16px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.card{background:#fff;border:1px solid var(--line);border-radius:9px;box-shadow:var(--shadow);overflow:hidden}.card-head{height:56px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}.card-title{font-size:15px;font-weight:700}.card-sub{font-size:11px;color:var(--muted);margin-top:3px}.card-body{padding:18px}.filters{padding:16px 18px;display:flex;align-items:end;gap:12px;flex-wrap:wrap}.field{min-width:150px;flex:1}.field label{display:block;color:#5c687b;font-size:12px;font-weight:600;margin-bottom:6px}.field input,.field select,.field textarea{width:100%;border:1px solid #d6deea;border-radius:6px;background:#fff;color:#28354a;outline:none}.field input,.field select{height:36px;padding:0 10px}.field textarea{padding:9px;min-height:68px;resize:vertical}.field input:focus,.field select:focus,.field textarea:focus{border-color:#6d9bea;box-shadow:0 0 0 3px #edf3ff}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;font-size:12px}th,td{padding:11px 13px;text-align:left;border-bottom:1px solid #edf1f6;white-space:nowrap}th{background:#f7f9fc;color:#59667b;font-weight:700}tbody tr:hover{background:#f7faff}.strong{font-weight:700}.tag{display:inline-block;border-radius:99px;padding:3px 8px;font-size:11px;font-weight:700}.tag-ok{background:#e8f7f0;color:#11815a}.tag-warn{background:#fff5dc;color:#9b6810}.tag-danger{background:#ffeded;color:#bd3f3f}.tag-info{background:#eaf2ff;color:#225dbb}.chart{height:225px;display:flex;align-items:flex-end;gap:12px;padding:22px 20px 14px}.bar-col{flex:1;height:100%;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:7px}.bar{width:min(32px,70%);background:linear-gradient(180deg,#66a0ff,#2866d3);border-radius:5px 5px 2px 2px;min-height:5px}.bar-label,.bar-value{font-size:10px;color:var(--muted)}.task{display:flex;align-items:flex-start;gap:11px;padding:13px 0;border-bottom:1px solid var(--line)}.task:last-child{border:0}.task-icon{min-width:34px;height:34px;border-radius:8px;background:#edf3ff;color:var(--primary);display:grid;place-items:center}.task b{font-size:12px}.task p{font-size:11px;color:var(--muted);margin:4px 0 0}.progress{height:7px;background:#edf1f6;border-radius:99px;overflow:hidden}.progress i{height:100%;display:block;background:linear-gradient(90deg,#2d6fdc,#72a4f8);border-radius:99px}.store-card{padding:18px}.store-head{display:flex;justify-content:space-between}.store-code{width:38px;height:38px;border-radius:8px;background:#edf3ff;color:var(--primary);display:grid;place-items:center;font-weight:800}.store-name{font-weight:700;margin:13px 0 5px}.store-meta{color:var(--muted);font-size:11px;line-height:1.7}.order-layout{display:grid;grid-template-columns:minmax(0,1.6fr) 350px;gap:16px}.summary-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dashed var(--line);font-size:12px}.summary-row:last-child{border:0}.summary-total{font-size:22px;color:var(--primary);font-weight:800}.qty{width:82px!important;height:31px!important;text-align:right}.order-status{padding:18px;border:1px solid #bce5d3;background:#f0faf6;border-radius:8px;margin-top:14px;display:none}.order-status.show{display:block}.order-status h3{margin:0 0 10px;color:#14825b}.order-status-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;font-size:12px}.empty{text-align:center;padding:42px;color:var(--muted)}.modal{position:fixed;inset:0;background:rgba(15,26,45,.48);z-index:20;display:none;place-items:center}.modal.open{display:grid}.modal-box{width:min(520px,calc(100% - 30px));background:#fff;border-radius:10px;padding:22px}.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}.switch{width:42px;height:23px;border:0;background:#cfd6e2;border-radius:99px;padding:3px;cursor:pointer}.switch:after{content:"";display:block;width:17px;height:17px;border-radius:50%;background:#fff;transition:.2s}.switch.on{background:var(--primary)}.switch.on:after{transform:translateX(19px)}.setting{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid var(--line)}.toast{position:fixed;right:24px;bottom:24px;background:#18233a;color:#fff;padding:12px 17px;border-radius:7px;transform:translateY(80px);opacity:0;transition:.2s;z-index:30;font-size:12px}.toast.show{transform:none;opacity:1}@media(max-width:1100px){.metrics{grid-template-columns:repeat(2,1fr)}.grid2,.order-layout{grid-template-columns:1fr}.grid3{grid-template-columns:repeat(2,1fr)}}@media(max-width:760px){.sidebar{width:68px}.nav-item span:last-child,.nav-label,.logo-copy{display:none}.logo{width:55px}.nav-item{justify-content:center;padding:0}.main{margin-left:68px}.content{padding:15px}.metrics,.grid3{grid-template-columns:1fr}.top-center,.top-link{display:none}}
</style>
</head><body>
<div class="app"><header class="top"><div class="logo"><div class="logo-mark">云</div><div class="logo-copy"><b>云膳供应链</b><small>餐饮经营管理平台</small></div></div><div class="top-center">数据中心　│　供应链协同　│　智能订货</div><div class="top-right"><span class="top-link">消息 3</span><span class="top-link">帮助</span><div class="avatar">管</div><span>系统管理员</span></div></header>
<aside class="sidebar"><div class="nav-label">经营中心</div><div class="nav-item active" id="navDashboard" data-view="dashboard"><span class="nav-icon">⌂</span><span>经营工作台</span></div><div class="nav-item" id="navInventory" data-view="inventory"><span class="nav-icon">▦</span><span>门店库存</span></div><div class="nav-label">供应链</div><div class="nav-item" id="navReplenish" data-view="replenish"><span class="nav-icon">＋</span><span>智能订货</span></div><div class="nav-item" id="navOrders" data-view="orders"><span class="nav-icon">▤</span><span>采购订单</span></div><div class="nav-label">基础资料</div><div class="nav-item" id="navStores" data-view="stores"><span class="nav-icon">◇</span><span>门店档案</span></div><div class="nav-item" id="navSuppliers" data-view="suppliers"><span class="nav-icon">◎</span><span>供应商管理</span></div><div class="nav-item" id="navSettings" data-view="settings"><span class="nav-icon">⚙</span><span>系统设置</span></div></aside>
<main class="main"><div class="crumb">云膳供应链 / <b id="crumbTitle">经营工作台</b></div><div class="content">
<section class="view active" id="view-dashboard"></section><section class="view" id="view-inventory"></section><section class="view" id="view-replenish"></section><section class="view" id="view-orders"></section><section class="view" id="view-stores"></section><section class="view" id="view-suppliers"></section><section class="view" id="view-settings"></section>
</div></main></div><div class="toast" id="toast"></div><div class="modal" id="confirmModal"><div class="modal-box"><h3>确认提交中央厨房订单</h3><div id="confirmText"></div><div class="field" style="margin-top:14px"><label for="confirmKeyword">确认关键词</label><input id="confirmKeyword" value="确认" placeholder="请输入：确认 / 同意 / 提交 / 下单"></div><div class="modal-actions"><button class="btn btn-outline" id="cancelSubmit">取消</button><button class="btn btn-primary" id="confirmSubmit">确认提交</button></div></div></div>
<script>
const $=id=>document.getElementById(id);let config,source,stores={},inventory=[],orders=[];const orderPreset={I001:120,I003:40,I005:70,I007:55,I009:60,I010:60,I011:75,I012:15,I014:20,I015:2.75};const titles={dashboard:'经营工作台',inventory:'门店库存',replenish:'智能订货',orders:'采购订单',stores:'门店档案',suppliers:'供应商管理',settings:'系统设置'};
const money=n=>'¥'+Number(n).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2});const metric=(t,v,f,i)=>`<div class="metric"><div class="metric-top"><span>${t}</span><span class="metric-icon">${i}</span></div><div class="metric-value">${v}</div><div class="metric-foot">${f}</div></div>`;const tag=(text,type='info')=>`<span class="tag tag-${type}">${text}</span>`;function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window.tt);window.tt=setTimeout(()=>t.classList.remove('show'),2200)}
async function init(){try{[config,source]=await Promise.all([fetch('data/order-config.json').then(r=>r.json()),fetch('data/inventory.json').then(r=>r.json())]);stores=config['门店下单配置'];orders=JSON.parse(localStorage.getItem('cloudKitchenOrders')||'[]');buildAll();bind();switchView(location.hash.slice(1)||'dashboard')}catch(e){document.querySelector('.content').innerHTML='<div class="card empty">数据文件加载失败，请通过 HTTP 服务访问页面。</div>'}}
function storeOptions(){return Object.values(stores).map(s=>`<option value="${s['门店编号']}">${s['门店编号']}｜${s['门店名称']}</option>`).join('')}
function storeData(id){return source['门店数据'][id]['金蝶数据']}
function buildAll(){buildDashboard();buildInventory();buildReplenish();buildOrders();buildStores();buildSuppliers();buildSettings()}
function buildDashboard(){const d=storeData('S001'),inv=d['库存现状'],risk=inv.filter(x=>x['当前库存']+x['在途库存']-x['预留库存']<x['安全库存']||x['当前库存']<x['近7天用量']/3).length;const plans=d['未来经营计划'];$('view-dashboard').innerHTML=`<div class="page-head"><div><h1>经营工作台</h1><p>多门店库存与中央厨房供应协同 · 数据日期 2026-07-23</p></div><button class="btn btn-primary" id="quickOrder">＋ 快速订货</button></div><div class="metrics">${metric('运营门店','6 家','全部门店数据校验通过','店')}${metric('库存原材料','90 项','每店 15 项原材料','料')}${metric('补货关注项',risk+' 项','广州天河店动态测算','!')}${metric('本周预测客流','2,016 人','基于近28天经营数据','人')}</div><div class="grid2"><div class="card"><div class="card-head"><div><div class="card-title">未来 7 天客流预测</div><div class="card-sub">广州天河店 · 结合预订及营销活动</div></div>${tag('预测模型已更新','ok')}</div><div class="chart" id="forecastChart"></div></div><div class="card"><div class="card-head"><div><div class="card-title">今日待办</div><div class="card-sub">供应链运营任务</div></div></div><div class="card-body"><div class="task"><span class="task-icon">补</span><div><b>广州天河店建议补货</b><p>10 项物料需要生成中央厨房订单</p></div></div><div class="task"><span class="task-icon">审</span><div><b>2 张采购订单待审核</b><p>预计金额 ¥13,684.00</p></div></div><div class="task"><span class="task-icon">盘</span><div><b>深圳南山店库存待盘点</b><p>计划完成时间：今日 17:00</p></div></div></div></div></div><div class="card"><div class="card-head"><div><div class="card-title">门店供应链概览</div><div class="card-sub">按区域查看库存与订单状态</div></div></div><div class="table-wrap"><table><thead><tr><th>门店编号</th><th>门店名称</th><th>所属区域</th><th>中央厨房</th><th>配送频次</th><th>库存品项</th><th>数据状态</th><th>操作</th></tr></thead><tbody>${Object.values(stores).map(s=>{const d=storeData(s['门店编号']);return`<tr><td>${s['门店编号']}</td><td class="strong">${s['门店名称']}</td><td>${s['模拟系统'].replace('金蝶供应链-','')}</td><td>${s['中央厨房']}</td><td>${d['门店参数']['配送频次']}</td><td>${d['库存现状'].length}</td><td>${tag('已同步','ok')}</td><td><button class="btn btn-light storeInventory" data-store="${s['门店编号']}">查看库存</button></td></tr>`}).join('')}</tbody></table></div></div>`;const values=[228,216,204,255,288,329,348];$('forecastChart').innerHTML=values.map((v,i)=>`<div class="bar-col"><span class="bar-value">${v}</span><div class="bar" style="height:${v/348*78}%"></div><span class="bar-label">${plans[i]?.['星期']||['周一','周二','周三','周四','周五','周六','周日'][i]}</span></div>`).join('')}
function buildInventory(){ $('view-inventory').innerHTML=`<div class="page-head"><div><h1>门店库存</h1><p>模拟金蝶云星空即时库存查询</p></div><button class="btn btn-outline" id="exportInventory">导出库存</button></div><div class="card"><div class="filters"><div class="field"><label for="inventoryStore">门店</label><select id="inventoryStore">${storeOptions()}</select></div><div class="field"><label for="inventoryKeyword">物料编码/名称</label><input id="inventoryKeyword" placeholder="如：I001、黑鱼片"></div><div class="field"><label for="inventoryLevel">动销等级</label><select id="inventoryLevel"><option value="">全部</option><option>快动销</option><option>正常</option></select></div><div class="field"><label for="inventoryRisk">库存状态</label><select id="inventoryRisk"><option value="">全部</option><option value="关注">需关注</option><option value="正常">正常</option></select></div><button class="btn btn-primary" id="inventorySearch">查询</button><button class="btn btn-light" id="inventoryReset">重置</button></div><div class="card-head"><div><div class="card-title" id="inventoryTitle">广州天河店库存现状</div><div class="card-sub" id="inventoryCount"></div></div></div><div class="table-wrap"><table><thead><tr><th>盘点日期</th><th>物料编码</th><th>原材料名称</th><th>单位</th><th>当前库存</th><th>在途库存</th><th>安全库存</th><th>近7天用量</th><th>包装规格</th><th>单位成本</th><th>动销等级</th><th>库存状态</th></tr></thead><tbody id="inventoryBody"></tbody></table></div></div>`;loadInventory('S001')}
function stockRisk(x){return x['当前库存']+x['在途库存']-x['预留库存']<x['安全库存']||x['当前库存']<x['近7天用量']/3?'关注':'正常'}
function loadInventory(id){inventory=storeData(id)['库存现状'].map(x=>({...x,risk:stockRisk(x)}));renderInventory(inventory);if($('inventoryTitle'))$('inventoryTitle').textContent=stores[id]['门店名称']+'库存现状'}
function renderInventory(rows){$('inventoryCount').textContent=`共 ${rows.length} 项物料 · 数据来源：模拟金蝶RPA`;$('inventoryBody').innerHTML=rows.length?rows.map(x=>`<tr><td>${x['盘点日期']}</td><td>${x['原材料编号']}</td><td class="strong">${x['原材料名称']}</td><td>${x['单位']}</td><td>${x['当前库存']}</td><td>${x['在途库存']}</td><td>${x['安全库存']}</td><td>${x['近7天用量']}</td><td>${x['包装规格']}</td><td>${money(x['单位成本'])}</td><td>${tag(x['动销等级'],x['动销等级']==='快动销'?'info':'ok')}</td><td>${tag(x.risk,x.risk==='关注'?'warn':'ok')}</td></tr>`).join(''):'<tr><td colspan="12" class="empty">没有符合条件的库存记录</td></tr>'}
function buildReplenish(){const s=stores.S001,inv=storeData('S001')['库存现状'];$('view-replenish').innerHTML=`<div class="page-head"><div><h1>智能订货</h1><p>根据门店库存与经营预测提交中央厨房订单</p></div>${tag('RPA 演示页面','info')}</div><div class="order-layout"><div><div class="card"><div class="card-head"><div><div class="card-title">订单基本信息</div><div class="card-sub">带 * 为必填字段</div></div></div><div class="card-body"><div class="grid3"><div class="field"><label for="orderStore">* 门店</label><select id="orderStore">${storeOptions()}</select></div><div class="field"><label for="orderKitchen">* 中央厨房</label><input id="orderKitchen" readonly value="${s['中央厨房']}"></div><div class="field"><label for="orderAddress">* 配送地址</label><input id="orderAddress" readonly value="${s['收货地址']}"></div><div class="field"><label for="deliveryStart">* 配送开始日期</label><input id="deliveryStart" type="date" value="2026-07-24"></div><div class="field"><label for="deliveryEnd">* 配送结束日期</label><input id="deliveryEnd" type="date" value="2026-07-30"></div><div class="field"><label for="requestNo">请求编号</label><input id="requestNo" value="REQ-20260723-S001-001"></div></div><div class="field" style="margin-top:14px"><label for="orderRemark">订单备注</label><textarea id="orderRemark">根据未来7天经营预测和库存水位自动生成，需中央厨房按日配送。</textarea></div></div></div><div class="card" style="margin-top:16px"><div class="card-head"><div><div class="card-title">订货明细</div><div class="card-sub">可修改建议订货量，金额自动计算</div></div><button class="btn btn-light" id="resetSuggestion">恢复建议量</button></div><div class="table-wrap"><table><thead><tr><th>物料编码</th><th>原材料名称</th><th>单位</th><th>当前库存</th><th>安全库存</th><th>近7天用量</th><th>包装规格</th><th>单位成本</th><th>* 订货量</th><th>金额</th></tr></thead><tbody id="orderItems">${inv.filter(x=>orderPreset[x['原材料编号']]!==undefined).map(x=>`<tr data-code="${x['原材料编号']}"><td>${x['原材料编号']}</td><td class="strong">${x['原材料名称']}</td><td>${x['单位']}</td><td>${x['当前库存']}</td><td>${x['安全库存']}</td><td>${x['近7天用量']}</td><td>${x['包装规格']}</td><td>${money(x['单位成本'])}</td><td><input class="qty orderQty" id="qty_${x['原材料编号']}" type="number" min="0" step="0.25" value="${orderPreset[x['原材料编号']]}" data-cost="${x['单位成本']}"></td><td class="lineAmount"></td></tr>`).join('')}</tbody></table></div></div></div><aside><div class="card"><div class="card-head"><div class="card-title">订单汇总</div></div><div class="card-body"><div class="summary-row"><span>订单编号</span><b id="orderNumber">HN-GZ-20260723140336</b></div><div class="summary-row"><span>门店名称</span><b id="summaryStore">广州天河店</b></div><div class="summary-row"><span>中央厨房</span><b id="summaryKitchen">华南中央厨房</b></div><div class="summary-row"><span>配送周期</span><b id="summaryPeriod">2026-07-24 至 2026-07-30</b></div><div class="summary-row"><span>配送地址</span><b id="summaryAddress">测试地址-天河商圈</b></div><div class="summary-row"><span>订货品项</span><b id="summaryItems">10 项</b></div><div style="padding-top:16px"><div class="card-sub">预计成本</div><div class="summary-total" id="estimatedCost">¥8,326.50</div></div><button class="btn btn-primary" id="submitOrder" style="width:100%;margin-top:18px">提交中央厨房订单</button><div class="order-status" id="orderResult"><h3>✓ 订单提交成功</h3><div class="order-status-grid"><span>订单编号</span><b id="resultOrderNo"></b><span>提交状态</span><b id="resultStatus">已提交</b><span>请求编号</span><b id="resultRequestNo"></b><span>提交时间</span><b id="resultTime"></b></div></div></div></div></aside></div>`;calcOrder()}
function buildOrders(){$('view-orders').innerHTML=`<div class="page-head"><div><h1>采购订单</h1><p>中央厨房订货单查询与状态跟踪</p></div><button class="btn btn-primary" id="newOrder">＋ 新建订单</button></div><div class="card"><div class="filters"><div class="field"><label>订单编号</label><input id="orderKeyword" placeholder="请输入订单编号"></div><div class="field"><label>门店</label><select id="orderStoreFilter"><option value="">全部门店</option>${storeOptions()}</select></div><div class="field"><label>提交状态</label><select id="orderStatusFilter"><option value="">全部状态</option><option>已提交</option><option>待审核</option><option>配送中</option><option>已完成</option></select></div><button class="btn btn-primary" id="orderSearch">查询</button></div><div class="table-wrap"><table><thead><tr><th>订单编号</th><th>门店名称</th><th>中央厨房</th><th>配送周期</th><th>订货品项</th><th>预计成本</th><th>提交状态</th><th>提交时间</th></tr></thead><tbody id="ordersBody"></tbody></table></div></div>`;renderOrders()}
function demoOrders(){return[{no:'HN-SZ-20260722101518',store:'深圳南山店',storeId:'S002',kitchen:'华南中央厨房',period:'2026-07-23 至 2026-07-29',items:9,cost:7658,status:'配送中',time:'2026-07-22 10:15:18'},{no:'HD-SH-20260721164803',store:'上海浦东店',storeId:'S003',kitchen:'华东中央厨房',period:'2026-07-22 至 2026-07-28',items:11,cost:9246,status:'已提交',time:'2026-07-21 16:48:03'},{no:'HB-BJ-20260720110927',store:'北京朝阳店',storeId:'S004',kitchen:'华北中央厨房',period:'2026-07-21 至 2026-07-27',items:8,cost:6890,status:'已完成',time:'2026-07-20 11:09:27'}]}
function renderOrders(){const rows=[...orders,...demoOrders()],k=$('orderKeyword')?.value.trim()||'',s=$('orderStoreFilter')?.value||'',st=$('orderStatusFilter')?.value||'',out=rows.filter(x=>(!k||x.no.includes(k))&&(!s||x.storeId===s)&&(!st||x.status===st));$('ordersBody').innerHTML=out.length?out.map(x=>`<tr><td class="strong">${x.no}</td><td>${x.store}</td><td>${x.kitchen}</td><td>${x.period}</td><td>${x.items}</td><td>${money(x.cost)}</td><td>${tag(x.status,x.status==='已完成'?'ok':x.status==='配送中'?'info':'warn')}</td><td>${x.time}</td></tr>`).join(''):'<tr><td colspan="8" class="empty">暂无符合条件的订单</td></tr>'}
function buildStores(){$('view-stores').innerHTML=`<div class="page-head"><div><h1>门店档案</h1><p>门店、配送与中央厨房基础资料</p></div><button class="btn btn-primary" id="addStore">＋ 新增门店</button></div><div class="grid3">${Object.values(stores).map(s=>{const p=storeData(s['门店编号'])['门店参数'];return`<div class="card store-card"><div class="store-head"><span class="store-code">${s['门店编号'].slice(1)}</span>${tag('营业中','ok')}</div><div class="store-name">${s['门店名称']}</div><div class="store-meta">中央厨房：${s['中央厨房']}<br>收货地址：${s['收货地址']}<br>餐位规模：${p['桌数']}桌 × ${p['每桌座位数']}人<br>配送频次：${p['配送频次']}</div></div>`}).join('')}</div>`}
function buildSuppliers(){$('view-suppliers').innerHTML=`<div class="page-head"><div><h1>供应商管理</h1><p>中央厨房与供应商履约档案</p></div><button class="btn btn-primary" id="addSupplier">＋ 新增供应商</button></div><div class="card"><div class="table-wrap"><table><thead><tr><th>供应商编码</th><th>供应商名称</th><th>服务区域</th><th>供应品类</th><th>准时交付率</th><th>质量合格率</th><th>合作状态</th></tr></thead><tbody><tr><td>SUP-HN-001</td><td class="strong">华南中央厨房</td><td>广州、深圳</td><td>生鲜、肉禽、调味品</td><td>98.6%</td><td>99.2%</td><td>${tag('合作中','ok')}</td></tr><tr><td>SUP-HD-001</td><td class="strong">华东中央厨房</td><td>上海、杭州</td><td>生鲜、肉禽、粮油</td><td>97.9%</td><td>98.8%</td><td>${tag('合作中','ok')}</td></tr><tr><td>SUP-HB-001</td><td class="strong">华北中央厨房</td><td>北京</td><td>生鲜、肉禽、调味品</td><td>98.1%</td><td>99.0%</td><td>${tag('合作中','ok')}</td></tr><tr><td>SUP-XN-001</td><td class="strong">西南中央厨房</td><td>成都</td><td>生鲜、粮油、干货</td><td>96.8%</td><td>98.5%</td><td>${tag('观察中','warn')}</td></tr></tbody></table></div></div>`}
function buildSettings(){$('view-settings').innerHTML=`<div class="page-head"><div><h1>系统设置</h1><p>数据同步、订货规则与通知配置</p></div><button class="btn btn-primary" id="saveSettings">保存设置</button></div><div class="grid2"><div class="card"><div class="card-head"><div class="card-title">智能订货规则</div></div><div class="card-body"><div class="setting"><div><b>启用安全库存校验</b><div class="card-sub">订货建议同时考虑在途与预留库存</div></div><button class="switch on"></button></div><div class="setting"><div><b>按包装规格取整</b><div class="card-sub">建议量自动向上取整到最小包装</div></div><button class="switch on"></button></div><div class="setting"><div><b>短保物料控制</b><div class="card-sub">保质期 5 天以内不超过最大库容</div></div><button class="switch on"></button></div></div></div><div class="card"><div class="card-head"><div class="card-title">金蝶数据同步</div></div><div class="card-body"><div class="field"><label>同步频率</label><select id="syncFrequency"><option>每 15 分钟</option><option selected>每 30 分钟</option><option>每 60 分钟</option></select></div><div class="setting"><div><b>库存同步失败提醒</b><div class="card-sub">连续失败两次后发送站内消息</div></div><button class="switch on"></button></div><div class="setting"><div><b>订单状态自动回写</b><div class="card-sub">中央厨房确认后更新门店订单状态</div></div><button class="switch on"></button></div></div></div></div>`}
function bind(){document.querySelectorAll('.nav-item[data-view]').forEach(n=>n.onclick=()=>switchView(n.dataset.view));document.addEventListener('click',e=>{const b=e.target.closest('.storeInventory');if(b){switchView('inventory');$('inventoryStore').value=b.dataset.store;loadInventory(b.dataset.store)}});$('quickOrder').onclick=()=>switchView('replenish');$('inventoryStore').onchange=e=>loadInventory(e.target.value);$('inventorySearch').onclick=filterInventory;$('inventoryReset').onclick=()=>{$('inventoryKeyword').value='';$('inventoryLevel').value='';$('inventoryRisk').value='';loadInventory($('inventoryStore').value)};$('exportInventory').onclick=()=>exportCsv(inventory);$('orderStore').onchange=changeOrderStore;$('deliveryStart').onchange=updateSummary;$('deliveryEnd').onchange=updateSummary;document.querySelectorAll('.orderQty').forEach(i=>i.oninput=calcOrder);$('resetSuggestion').onclick=()=>{document.querySelectorAll('.orderQty').forEach(i=>i.value=orderPreset[i.id.replace('qty_','')]||0);calcOrder()};$('submitOrder').onclick=openConfirm;$('cancelSubmit').onclick=()=>$('confirmModal').classList.remove('open');$('confirmSubmit').onclick=submitOrder;$('newOrder').onclick=()=>switchView('replenish');$('orderSearch').onclick=renderOrders;$('addStore').onclick=() => toast('演示环境：新增门店入口已打开');$('addSupplier').onclick=()=>toast('演示环境：新增供应商入口已打开');$('saveSettings').onclick=()=>toast('系统设置已保存');document.querySelectorAll('.switch').forEach(s=>s.onclick=()=>s.classList.toggle('on'))}
function switchView(v){if(!titles[v])v='dashboard';document.querySelectorAll('.view').forEach(x=>x.classList.toggle('active',x.id==='view-'+v));document.querySelectorAll('.nav-item[data-view]').forEach(x=>x.classList.toggle('active',x.dataset.view===v));$('crumbTitle').textContent=titles[v];document.title='云膳供应链｜'+titles[v];location.hash=v;scrollTo(0,0)}
function filterInventory(){const k=$('inventoryKeyword').value.trim(),l=$('inventoryLevel').value,r=$('inventoryRisk').value;renderInventory(inventory.filter(x=>(!k||x['原材料编号'].includes(k)||x['原材料名称'].includes(k))&&(!l||x['动销等级']===l)&&(!r||x.risk===r)))}
function calcOrder(){let total=0,count=0;document.querySelectorAll('#orderItems tr').forEach(tr=>{const q=Number(tr.querySelector('.orderQty').value)||0,c=Number(tr.querySelector('.orderQty').dataset.cost);tr.querySelector('.lineAmount').textContent=money(q*c);total+=q*c;if(q>0)count++});$('estimatedCost').textContent=money(total);$('summaryItems').textContent=count+' 项'}
function updateSummary(){const id=$('orderStore').value,s=stores[id];$('summaryStore').textContent=s['门店名称'];$('summaryKitchen').textContent=s['中央厨房'];$('summaryAddress').textContent=s['收货地址'];$('summaryPeriod').textContent=$('deliveryStart').value+' 至 '+$('deliveryEnd').value}
function changeOrderStore(){const id=$('orderStore').value,s=stores[id];$('orderKitchen').value=s['中央厨房'];$('orderAddress').value=s['收货地址'];const stamp='20260723140336';$('orderNumber').textContent=s['订单前缀']+'-'+stamp;updateSummary()}
function openConfirm(){if(!$('deliveryStart').value||!$('deliveryEnd').value||$('deliveryStart').value>$('deliveryEnd').value){toast('请检查配送周期');return}$('confirmText').innerHTML=`<div class="summary-row"><span>订单编号</span><b>${$('orderNumber').textContent}</b></div><div class="summary-row"><span>门店</span><b>${$('summaryStore').textContent}</b></div><div class="summary-row"><span>中央厨房</span><b>${$('summaryKitchen').textContent}</b></div><div class="summary-row"><span>预计成本</span><b>${$('estimatedCost').textContent}</b></div>`;$('confirmModal').classList.add('open')}
function submitOrder(){if(!config['确认关键词'].includes($('confirmKeyword').value.trim())){toast('确认关键词不正确');return}const id=$('orderStore').value,now='2026-07-23 14:03:36',o={no:$('orderNumber').textContent,storeId:id,store:$('summaryStore').textContent,kitchen:$('summaryKitchen').textContent,period:$('summaryPeriod').textContent,address:$('summaryAddress').textContent,items:Number($('summaryItems').textContent.replace(' 项','')),cost:Number($('estimatedCost').textContent.replace(/[¥,]/g,'')),status:config['返回状态']['成功'],time:now,requestNo:$('requestNo').value};orders.unshift(o);localStorage.setItem('cloudKitchenOrders',JSON.stringify(orders));$('confirmModal').classList.remove('open');$('resultOrderNo').textContent=o.no;$('resultRequestNo').textContent=o.requestNo;$('resultTime').textContent=o.time;$('orderResult').classList.add('show');renderOrders();toast('中央厨房订单提交成功')}
function exportCsv(rows){const data=rows.map(x=>Object.values(x).map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+data],{type:'text/csv'}));a.download='门店库存_'+$('inventoryStore').value+'.csv';a.click();toast('库存数据已导出')}
init();
</script></body></html>
